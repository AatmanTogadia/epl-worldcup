<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPL Players at the World Cup 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235;
      --border: rgba(255,255,255,0.08); --text: #f0f4ff;
      --text2: #8892a4; --green: #00d68f; --blue: #4da6ff;
      --yellow: #f5c518; --red: #ff4d6d; --gold: #FFD700;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .hero { background: linear-gradient(135deg, #0a0f1e 0%, #0e1a35 60%, #0a2a1a 100%); border-bottom: 1px solid var(--border); padding: 2rem 2rem 1.5rem; }
    .hero-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
    .trophy { font-size: 3rem; filter: drop-shadow(0 0 16px rgba(255,215,0,0.4)); }
    .hero-title { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; }
    .hero-sub { font-size: 0.75rem; color: var(--text2); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
    .wc-pill { background: var(--gold); color: #000; font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; display: inline-block; }
    .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
    .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 240px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.75rem; opacity: 0.35; pointer-events: none; }
    .ctrl { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 0.8rem; color: var(--text); font-family: 'Inter', sans-serif; }
    .ctrl:focus { outline: none; border-color: rgba(255,255,255,0.2); }
    .ctrl::placeholder { color: var(--text2); }
    .ctrl-search { padding-left: 30px; width: 100%; }
    select.ctrl { cursor: pointer; }
    .chips { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
    .chip { font-size: 0.68rem; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
    .rbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 8px; }
    .cd-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--text2); }
    .cd-track { width: 80px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .cd-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 1s linear; }
    .last-upd { font-size: 0.68rem; color: var(--text2); }
    .rbtn { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 5px 14px; font-size: 0.75rem; color: var(--text2); cursor: pointer; font-family: 'Inter', sans-serif; transition: 0.15s; }
    .rbtn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
    .rbtn.spin { animation: pulse 0.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .tbl-wrap { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 620px; }
    thead th { background: var(--surface2); color: var(--text2); font-weight: 500; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
    thead th:hover { color: var(--text); }
    thead th.active { color: var(--green); }
    tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.025); }
    .pname { font-weight: 500; font-size: 0.84rem; }
    .pnat { font-size: 0.68rem; color: var(--text2); margin-top: 1px; }
    .club-wrap { display: flex; align-items: center; gap: 7px; }
    .club-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sc { text-align: center; }
    .g { color: var(--green); font-weight: 600; }
    .a { color: var(--blue); font-weight: 600; }
    .yc { display: inline-block; width: 10px; height: 13px; background: var(--yellow); border-radius: 2px; vertical-align: middle; }
    .rc { display: inline-block; width: 10px; height: 13px; background: var(--red); border-radius: 2px; vertical-align: middle; }
    .cx { font-size: 0.68rem; color: var(--text2); margin-left: 2px; vertical-align: middle; }
    .msg-row td { text-align: center; padding: 3rem; color: var(--text2); font-size: 0.85rem; }
    .shimmer { background: linear-gradient(90deg,var(--surface2) 25%,#1f2e48 50%,var(--surface2) 75%); background-size: 200% 100%; animation: sh 1.4s infinite; border-radius: 4px; height: 13px; display: inline-block; }
    @keyframes sh { to { background-position: -200% 0; } }
  </style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
    <div class="trophy">🏆</div>
    <div>
      <div class="hero-title">EPL at the World Cup</div>
      <div class="hero-sub">FIFA World Cup 2026 · Player Stats</div>
      <div class="wc-pill">USA · Canada · Mexico</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⚽</span>
      <input type="text" class="ctrl ctrl-search" id="search" placeholder="Search players, clubs…" oninput="renderTable()">
    </div>
    <select class="ctrl" id="club-f" onchange="renderTable()"><option value="">All clubs</option></select>
    <select class="ctrl" id="nat-f" onchange="renderTable()"><option value="">All nations</option></select>
    <div class="chips">
      <span class="chip" id="chip-p">—</span>
      <span class="chip" id="chip-c">—</span>
    </div>
  </div>

  <div class="rbar">
    <div class="cd-wrap">
      <span>Refresh in <strong id="cd-s">5:00</strong></span>
      <div class="cd-track"><div class="cd-fill" id="cd-fill" style="width:100%"></div></div>
      <span class="last-upd" id="last-upd"></span>
    </div>
    <button class="rbtn" id="rbtn" onclick="doRefresh()">↻ Refresh now</button>
  </div>

  <div class="tbl-wrap">
    <table>
      <colgroup>
        <col style="width:22%"><col style="width:20%"><col style="width:10%">
        <col style="width:10%"><col style="width:11%"><col style="width:13%"><col style="width:14%">
      </colgroup>
      <thead>
        <tr>
          <th onclick="sortBy('name',this)">Player <span id="a-name">↕</span></th>
          <th onclick="sortBy('club',this)">Club <span id="a-club">↕</span></th>
          <th class="sc" onclick="sortBy('minutes',this)">Mins <span id="a-minutes">↕</span></th>
          <th class="sc" onclick="sortBy('goals',this)">Goals <span id="a-goals">↕</span></th>
          <th class="sc" onclick="sortBy('assists',this)">Assists <span id="a-assists">↕</span></th>
          <th class="sc" onclick="sortBy('yellow',this)">Yellow <span id="a-yellow">↕</span></th>
          <th class="sc" onclick="sortBy('red',this)">Red <span id="a-red">↕</span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const REFRESH_MS = 5 * 60 * 1000;
  const REFRESH_S  = 300;
  const CLUB_COLORS = {
    Arsenal:'#EF0107',Chelsea:'#034694','Manchester City':'#6CABDD',
    'Manchester United':'#DA291C',Liverpool:'#C8102E',Tottenham:'#132257',
    Newcastle:'#241F20','Aston Villa':'#670E36','West Ham':'#7A263A',
    Brighton:'#0057B8',Brentford:'#D20000',Fulham:'#CC0000',
    'Nottingham Forest':'#DD0000',Everton:'#003399','Crystal Palace':'#1B458F',
    Wolverhampton:'#FDB913',Leicester:'#003090',Southampton:'#D71920',
    Ipswich:'#0044A9',Bournemouth:'#DA291C'
  };
  function clubColor(n){if(!n)return'#555';for(const[k,v]of Object.entries(CLUB_COLORS))if(n.toLowerCase().includes(k.toLowerCase().split(' ')[0]))return v;return'#555';}

  let players=[],sortKey='goals',sortAsc=false,cdTimer,refTimer,cdVal=REFRESH_S;

  async function fetchStats(){
    setBusy(true);
    try{
      const r=await fetch("/api/stats",{method:"GET"});
      if(!r.ok){const e=await r.json();throw new Error(e.error||'Server error');}
      const json=await r.json();
      players=json.players||json;
      updateFilters();renderTable();updateChips();
      document.getElementById('last-upd').textContent='· Updated '+new Date().toLocaleTimeString();
    }catch(e){
      document.getElementById('tbody').innerHTML=`<tr class="msg-row"><td colspan="7">Error: ${e.message}</td></tr>`;
    }
    setBusy(false);
  }

  function setBusy(on){
    document.getElementById('rbtn').classList.toggle('spin',on);
    if(on) document.getElementById('tbody').innerHTML=Array.from({length:6},()=>`<tr>${Array.from({length:7},(_,i)=>`<td${i>1?' class="sc"':''}><div class="shimmer" style="width:${i===0?'120px':i===1?'90px':'28px'}"></div></td>`).join('')}</tr>`).join('');
  }

  function updateFilters(){
    const clubs=[...new Set(players.map(p=>p.club))].sort();
    const nats=[...new Set(players.map(p=>p.nationality||''))].filter(Boolean).sort();
    const cf=document.getElementById('club-f'),nf=document.getElementById('nat-f');
    const pc=cf.value,pn=nf.value;
    cf.innerHTML='<option value="">All clubs</option>'+clubs.map(c=>`<option${c===pc?' selected':''}>${c}</option>`).join('');
    nf.innerHTML='<option value="">All nations</option>'+nats.map(n=>`<option${n===pn?' selected':''}>${n}</option>`).join('');
  }

  function updateChips(){
    document.getElementById('chip-p').textContent=players.length+' players';
    document.getElementById('chip-c').textContent=new Set(players.map(p=>p.club)).size+' clubs';
  }

  function renderTable(){
    const q=document.getElementById('search').value.toLowerCase();
    const cf=document.getElementById('club-f').value;
    const nf=document.getElementById('nat-f').value;
    let list=players.filter(p=>(!q||p.name.toLowerCase().includes(q)||(p.club||'').toLowerCase().includes(q)||(p.nationality||'').toLowerCase().includes(q))&&(!cf||p.club===cf)&&(!nf||p.nationality===nf));
    list.sort((a,b)=>{let va=a[sortKey],vb=b[sortKey];if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();}return sortAsc?(va>vb?1:-1):(va<vb?1:-1);});
    if(!list.length){document.getElementById('tbody').innerHTML='<tr class="msg-row"><td colspan="7">No players match your filters.</td></tr>';return;}
    document.getElementById('tbody').innerHTML=list.map(p=>`<tr>
      <td><div class="pname">${p.name}</div><div class="pnat">${p.nationality||'—'}</div></td>
      <td><div class="club-wrap"><span class="club-dot" style="background:${clubColor(p.club)}"></span><span>${p.club||'—'}</span></div></td>
      <td class="sc">${p.minutes?p.minutes+"'":'—'}</td>
      <td class="sc ${p.goals>0?'g':''}">${p.goals}</td>
      <td class="sc ${p.assists>0?'a':''}">${p.assists}</td>
      <td class="sc">${p.yellow>0?'<span class="yc"></span>'+(p.yellow>1?'<span class="cx">×'+p.yellow+'</span>':''):'—'}</td>
      <td class="sc">${p.red>0?'<span class="rc"></span>':'—'}</td>
    </tr>`).join('');
  }

  function sortBy(key,th){
    sortAsc=sortKey===key?!sortAsc:(key==='name'||key==='club');sortKey=key;
    document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('active');t.querySelector('span').textContent='↕';});
    th.classList.add('active');th.querySelector('span').textContent=sortAsc?'↑':'↓';
    renderTable();
  }

  function startCountdown(){
    clearInterval(cdTimer);clearTimeout(refTimer);cdVal=REFRESH_S;tick();
    cdTimer=setInterval(tick,1000);refTimer=setTimeout(doRefresh,REFRESH_MS);
  }

  function tick(){
    if(cdVal<=0){clearInterval(cdTimer);return;}
    const m=Math.floor(cdVal/60),s=cdVal%60;
    document.getElementById('cd-s').textContent=m+':'+String(s).padStart(2,'0');
    document.getElementById('cd-fill').style.width=(cdVal/REFRESH_S*100)+'%';cdVal--;
  }

  function doRefresh(){clearInterval(cdTimer);clearTimeout(refTimer);fetchStats().then(startCountdown);}
  doRefresh();
</script>
</body>
</html>
